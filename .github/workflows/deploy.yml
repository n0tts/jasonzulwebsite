name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🛠️ Install dependencies
        run: npm install

      - name: 🏗️ Build project
        run: npm run build

      - name: 🚀 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets['ftp.ufes.com.my'] }}
          username: ${{ secrets['server@jasonzulfadhli.com.my'] }}
          password: ${{ secrets['fTP-JZ2026!'] }}
          local-dir: ./dist/
          server-dir: ./public_html/
